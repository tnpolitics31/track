kind = "web"
previewPath = "/"
title = "Tweet Tracker"
version = "1.0.0"
id = "artifacts/tweet-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19583

[services.development]
run = "pnpm --filter @workspace/tweet-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tweet-tracker", "run", "build" ]
publicDir = "artifacts/tweet-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19583"
BASE_PATH = "/"
